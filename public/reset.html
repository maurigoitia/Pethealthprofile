<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Pessy</title>
<meta name="robots" content="noindex, nofollow">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:linear-gradient(180deg,#074738 0%,#0e6a5a 50%,#1a9b7d 100%);
  color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}
.card{
  background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.1);border-radius:28px;
  padding:40px 32px;max-width:440px;width:100%;text-align:center;
}
h1{font-size:28px;font-weight:800;letter-spacing:-0.025em;margin-bottom:12px;color:#fff}
p{font-size:15px;line-height:1.5;color:rgba(255,255,255,0.8);margin-bottom:22px}
.step{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:14px;text-align:left}
.step.ok{color:#7DDCC0}
.step.pending{color:rgba(255,255,255,0.5)}
.step.error{color:#FCA5A5}
.check{width:22px;height:22px;border-radius:50%;background:#7DDCC0;color:#074738;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.check.pending{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.5)}
.check.error{background:#FCA5A5;color:#7f1d1d}
button{
  background:#fff;color:#074738;font-weight:800;font-size:14px;
  padding:14px 28px;border:none;border-radius:14px;cursor:pointer;
  margin-top:20px;width:100%;transition:transform 200ms;
}
button:hover{transform:translateY(-2px)}
.small{font-size:12px;color:rgba(255,255,255,0.5);margin-top:16px}
.small a{color:#7DDCC0;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <h1>🧹 Reset de Pessy</h1>
  <p>Limpiando caché y Service Worker para que puedas entrar con la versión nueva.</p>
  <div id="steps">
    <div class="step pending" id="s1"><div class="check pending">1</div> Esperando…</div>
    <div class="step pending" id="s2"><div class="check pending">2</div> Esperando…</div>
    <div class="step pending" id="s3"><div class="check pending">3</div> Esperando…</div>
  </div>
  <button id="go" style="display:none" onclick="location.href='/inicio'">Ir a Pessy →</button>
  <p class="small">Si algo falla, <a href="/">volver al inicio</a>.</p>
</div>

<script>
(async function(){
  const s1 = document.getElementById('s1');
  const s2 = document.getElementById('s2');
  const s3 = document.getElementById('s3');
  const go = document.getElementById('go');

  const mark = (el, ok, text) => {
    el.className = 'step ' + (ok ? 'ok' : 'error');
    el.querySelector('.check').className = 'check ' + (ok ? '' : 'error');
    el.querySelector('.check').textContent = ok ? '✓' : '!';
    el.lastChild.textContent = ' ' + text;
  };

  // 1. Unregister SW
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
      mark(s1, true, 'Service Worker eliminado (' + regs.length + ')');
    } else {
      mark(s1, true, 'Service Worker no soportado (ok)');
    }
  } catch (e) { mark(s1, false, 'Error SW: ' + e.message); }

  // 2. Clear all caches
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
      mark(s2, true, 'Caches eliminados (' + keys.length + ')');
    } else {
      mark(s2, true, 'Cache API no soportado (ok)');
    }
  } catch (e) { mark(s2, false, 'Error caches: ' + e.message); }

  // 3. Clear local/session storage (keep no auth data — just build/version cache)
  try {
    // Eliminar solo keys de build — preservamos auth
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && (k.startsWith('pessy_build_') || k.startsWith('pessy_chunk_'))) {
        keysToRemove.push(k);
      }
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
    sessionStorage.clear();
    mark(s3, true, 'Storage limpiado (' + keysToRemove.length + ' claves)');
  } catch (e) { mark(s3, false, 'Error storage: ' + e.message); }

  // Auto redirect after 1.5s
  setTimeout(() => {
    go.style.display = 'block';
    // Auto-go después de 2 segundos más
    setTimeout(() => location.href = '/inicio', 2000);
  }, 1500);
})();
</script>
</body>
</html>
