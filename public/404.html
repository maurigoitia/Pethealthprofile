<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Página no encontrada — Pessy</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="/pessy-favicon.svg" />
  <meta name="theme-color" content="#074738" />
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Manrope', system-ui, sans-serif; background: #F0FAF9; }
    h1, h2 { font-family: 'Plus Jakarta Sans', sans-serif; }
    @keyframes earWiggle { 0%,100%{transform:rotate(-18deg)}50%{transform:rotate(-14deg)} }
    @keyframes tailWag { 0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-10deg)} }
    .ear-wiggle { animation: earWiggle 3s ease-in-out infinite; transform-origin: 44px 46px; }
    .wag { animation: tailWag 1.5s ease-in-out infinite; transform-origin: 104px 114px; }
    @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)} }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <nav class="w-full px-6 py-4 flex items-center justify-between max-w-5xl mx-auto">
    <a href="/" class="flex items-center gap-2">
      <img src="/pessy-favicon.svg" alt="Pessy" class="w-8 h-8" />
      <span style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:#074738;font-size:1.25rem;">Pessy</span>
    </a>
  </nav>
  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center fade-in max-w-md">
      <!-- Cork perdido buscando la página -->
      <div class="float mx-auto mb-6" style="width:160px;height:180px;">
        <svg viewBox="0 0 140 170" fill="none" width="160" height="180">
          <ellipse cx="70" cy="128" rx="36" ry="30" fill="#d4ede8" stroke="#074738" stroke-width="2.5"/>
          <circle cx="70" cy="70" r="30" fill="#d4ede8" stroke="#074738" stroke-width="2.5"/>
          <ellipse cx="44" cy="46" rx="12" ry="20" fill="#1A9B7D" stroke="#074738" stroke-width="2.5" transform="rotate(-18,44,46)" class="ear-wiggle"/>
          <ellipse cx="96" cy="46" rx="12" ry="20" fill="#1A9B7D" stroke="#074738" stroke-width="2.5" transform="rotate(18,96,46)"/>
          <!-- Ojos buscando (mirando a un lado) -->
          <circle cx="56" cy="66" r="5" fill="#074738"/>
          <circle cx="80" cy="66" r="5" fill="#074738"/>
          <circle cx="54" cy="64" r="2" fill="white"/>
          <circle cx="78" cy="64" r="2" fill="white"/>
          <!-- Nariz -->
          <ellipse cx="70" cy="78" rx="5.5" ry="4" fill="#074738"/>
          <!-- Boca sorprendida -->
          <ellipse cx="70" cy="86" rx="4" ry="3" fill="#e8847a" opacity="0.7"/>
          <!-- Cola -->
          <path d="M104 114 Q122 94 116 70" stroke="#074738" stroke-width="2.5" fill="none" stroke-linecap="round" class="wag"/>
          <!-- Patitas -->
          <rect x="52" y="150" width="12" height="16" rx="6" fill="#d4ede8" stroke="#074738" stroke-width="2.5"/>
          <rect x="76" y="150" width="12" height="16" rx="6" fill="#d4ede8" stroke="#074738" stroke-width="2.5"/>
          <!-- Collar -->
          <path d="M48 96 Q70 104 92 96" stroke="#5048CA" stroke-width="3" fill="none" stroke-linecap="round"/>
          <circle cx="70" cy="101" r="3" fill="#5048CA"/>
          <!-- Signo de pregunta flotando -->
          <text x="110" y="40" fill="#1A9B7D" font-size="24" font-weight="800" font-family="Plus Jakarta Sans, sans-serif" opacity="0.6">?</text>
        </svg>
      </div>

      <h1 style="font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;color:#074738;font-size:1.8rem;margin-bottom:0.5rem;">
        ¡Ups! Cork no encuentra esta página
      </h1>
      <p style="color:#3d5a50;font-size:1rem;line-height:1.7;margin-bottom:2rem;">
        Parece que se perdió olfateando por acá. Volvé al inicio o explorá el blog.
      </p>

      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <a href="/" style="display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;background:#1A9B7D;color:white;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;border-radius:14px;text-decoration:none;box-shadow:0 4px 12px rgba(26,155,125,0.3);">
          Ir al inicio
        </a>
        <a href="/blog" style="display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border:1.5px solid #1A9B7D;color:#1A9B7D;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.9rem;border-radius:14px;text-decoration:none;">
          Ver el blog
        </a>
      </div>
    </div>
  </main>
  <footer class="w-full px-6 py-6 text-center">
    <p style="color:rgba(7,71,56,0.4);font-size:0.75rem;">&copy; 2026 Pessy. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
