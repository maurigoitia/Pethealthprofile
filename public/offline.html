<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pessy - Sin conexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #F0FAF9;
      color: #074738;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container {
      max-width: 380px;
    }
    .logo {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background-color: #074738;
      color: #F0FAF9;
      border: none;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
    .wifi-icon {
      display: block;
      margin: 0 auto 1rem;
      width: 64px;
      height: 64px;
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="logo" src="/pessy-logo.png" alt="Pessy" />
    <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" stroke="#074738" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23" />
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9" />
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
      <line x1="12" y1="20" x2="12.01" y2="20" />
    </svg>
    <h1>Sin conexion</h1>
    <p>Tus datos estan guardados y se sincronizan cuando vuelvas.</p>
    <button class="retry-btn" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
