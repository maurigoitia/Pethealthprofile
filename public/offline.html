<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Pessy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Manrope', system-ui, sans-serif;
      background: linear-gradient(160deg, #074738 0%, #0a6b54 50%, #1A9B7D 100%);
      color: white;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 48px 32px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.7; line-height: 1.6; margin-bottom: 24px; }
    .retry {
      display: inline-block;
      background: white;
      color: #074738;
      font-weight: 800;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 14px 32px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .retry:hover { opacity: 0.9; }
    .brand {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>
      Pessy necesita internet para sincronizar los datos de tu mascota.
      Revisá tu conexión e intentá de nuevo.
    </p>
    <a href="/" class="retry" onclick="window.location.reload(); return false;">
      Reintentar
    </a>
  </div>
  <div class="brand">Pessy</div>
</body>
</html>
