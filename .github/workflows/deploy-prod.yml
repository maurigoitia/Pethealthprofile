name: Deploy — Production
on:
  workflow_run:
    workflows: ["CI — PR Checks"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/842879609097/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: pessy-github-deploy@polar-scene-488615-i0.iam.gserviceaccount.com

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force && cd functions && npm ci

      - name: TypeScript check (functions)
        run: cd functions && npx tsc --noEmit

      - name: Build frontend
        run: npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ vars.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ vars.VITE_FIREBASE_VAPID_KEY }}
          VITE_USE_BACKEND_ANALYSIS: ${{ vars.VITE_USE_BACKEND_ANALYSIS }}

      - name: Deploy hosting to Production
        run: npx firebase-tools deploy --only hosting:app --project polar-scene-488615-i0

      - name: Deploy functions to Production
        run: npx firebase-tools deploy --only functions --project polar-scene-488615-i0 --force

      - name: Deploy Firestore and Storage rules
        run: npx firebase-tools deploy --only firestore:rules,storage --project polar-scene-488615-i0

      - name: Smoke test — verify pessy.app is up
        run: |
          echo "Waiting 15s for deploy to propagate..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://pessy.app)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test FAILED — pessy.app returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed — pessy.app is up (HTTP 200)"

      - name: Smoke test — verify app.pessy.app/inicio is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 https://pessy.app/inicio)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ /inicio returned HTTP $STATUS (may be client-side route)"
          else
            echo "✅ pessy.app/inicio is up (HTTP 200)"
          fi
