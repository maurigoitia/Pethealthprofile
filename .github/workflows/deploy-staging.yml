name: Deploy — Staging (appqa)
on:
  push:
    branches: [develop]

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/842879609097/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: pessy-github-deploy@polar-scene-488615-i0.iam.gserviceaccount.com

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force && cd functions && npm ci

      - name: TypeScript check (functions)
        run: cd functions && npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_ENV: staging

      # El site 'pessy-qa-app' no existe o el SA no tiene permisos para escribirlo.
      # Usamos Preview Channel sobre el site 'app' (prod site) → URL temporal aislada
      # de producción. Channels duran hasta 30 días y no afectan a pessy.app.
      - name: Deploy to Firebase Preview Channel (develop)
        id: deploy
        run: |
          CHANNEL="develop"
          OUTPUT=$(npx firebase-tools hosting:channel:deploy "$CHANNEL" \
            --only hosting:app \
            --expires 30d \
            --project polar-scene-488615-i0 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oE 'https://[^[:space:]]+\.web\.app' | head -1)
          echo "preview_url=$URL" >> "$GITHUB_OUTPUT"
          echo ""
          echo "============================================="
          echo "🌐 QA URL: $URL"
          echo "📦 Commit: ${GITHUB_SHA:0:7}"
          echo "============================================="
