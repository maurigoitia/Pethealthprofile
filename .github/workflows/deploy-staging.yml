name: Deploy — Staging (appqa)

# ⚠️ Staging deploys HOSTING ONLY.
#
# Backend resources (Cloud Functions, Firestore rules, Firestore indexes,
# Storage rules, Authentication) are SHARED with production in the same
# Firebase project (polar-scene-488615-i0).
#
# Do NOT deploy functions, firestore:rules, firestore:indexes, or storage
# from develop while staging and production share the same Firebase project.
# Those resources are deployed only from `main` via deploy-prod.yml to avoid
# accidentally pushing in-progress backend changes to production.
# See docs/BRANCHES.md for the branch + deploy model.

on:
  push:
    branches: [develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/842879609097/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: pessy-github-deploy@polar-scene-488615-i0.iam.gserviceaccount.com

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --force && cd functions && npm ci

      - name: TypeScript check (root)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript check (functions)
        run: cd functions && npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Build frontend
        run: npm run build
        env:
          VITE_ENV: staging

