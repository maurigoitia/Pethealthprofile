name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run tests
        run: npm test || true
        # TODO: remove || true once test suite is fixed

      - name: Run intelligence training set
        run: npx tsx src/domain/intelligence/__training_check__.ts

      - name: Build Cloud Functions
        working-directory: functions
        run: npm ci && npm run build

  lint-rules:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check Firestore rules syntax
        run: |
          if ! head -1 firestore.rules | grep -q "rules_version"; then
            echo "ERROR: firestore.rules missing rules_version header"
            exit 1
          fi
          echo "Firestore rules syntax OK"

      - name: Check Storage rules syntax
        run: |
          if ! head -1 storage.rules | grep -q "rules_version"; then
            echo "ERROR: storage.rules missing rules_version header"
            exit 1
          fi
          echo "Storage rules syntax OK"

      - name: Block hosting deploy from main
        run: |
          if grep -r "firebase deploy.*hosting" .github/workflows/ 2>/dev/null | grep -v "Block hosting"; then
            echo "ERROR: Found hosting deploy in CI — MUST only happen from pessy-website branch"
            exit 1
          fi
          echo "No hosting deploy found in CI — safe"
