name: CI — PR Checks

on:
  pull_request:
    branches: [main, develop]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --force

      - name: Install functions dependencies
        run: cd functions && npm ci

      - name: TypeScript check (root)
        run: npx tsc --noEmit --skipLibCheck

      - name: TypeScript check (functions)
        run: cd functions && npx tsc --noEmit

      - name: Lint (functions)
        run: cd functions && npm run lint

      - name: Unit tests (vitest)
        run: npm test

      - name: Build frontend (Vite)
        run: npm run build

      - name: Comment PR result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅ CI passed' : '❌ CI failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${status} — TypeScript + lint + tests + build`
            });
