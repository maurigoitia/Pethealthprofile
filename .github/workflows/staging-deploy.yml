name: Deploy Staging

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: staging-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run intelligence training set (gate)
        run: npx tsx scripts/run-training-set.ts

      - name: Build
        run: npm run build

      - name: Deploy to Firebase preview channel
        id: deploy
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          npm install -g firebase-tools
          CHANNEL_ID="pr-${PR_NUMBER}"
          OUTPUT=$(npx firebase hosting:channel:deploy "$CHANNEL_ID" \
            --project polar-scene-488615-i0 \
            --token "$FIREBASE_TOKEN" \
            --expires 7d \
            --json 2>&1) || true
          PREVIEW_URL=$(echo "$OUTPUT" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const url = data?.result?.['polar-scene-488615-i0']?.url || 'URL not available';
            process.stdout.write(url);
          " 2>/dev/null || echo "Preview URL not available")
          echo "url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const url = process.env.PREVIEW_URL;
            const body = url && url !== 'Preview URL not available'
              ? `**Preview deployed** ${url}\n\nTraining set passed.`
              : `Preview deploy failed. Check workflow logs.`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview deploy')
            );
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
