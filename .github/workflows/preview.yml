name: Preview — PR Channel

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/842879609097/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: pessy-github-deploy@polar-scene-488615-i0.iam.gserviceaccount.com

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci --ignore-optional

      - name: Build frontend
        if: github.event.action != 'closed'
        run: npm run build

      - name: Deploy preview channel
        if: github.event.action != 'closed'
        id: deploy
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          OUTPUT=$(npx firebase-tools hosting:channel:deploy "$CHANNEL" \
            --only hosting:app \
            --expires 7d \
            --project polar-scene-488615-i0 2>&1)
          echo "$OUTPUT"
          URL=$(echo "$OUTPUT" | grep -oP 'https://[^\s]+\.web\.app' | head -1)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT

      - name: Comment PR with preview URL
        if: github.event.action != 'closed'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            const prNumber = context.issue.number;
            const body = [
              '## 🔍 Preview Channel',
              '',
              '| | |',
              '|---|---|',
              `| **App** | [${url}](${url}) |`,
              '| **Expira** | 7 días |',
              '',
              '> Generado automáticamente por este PR. Se elimina al cerrar/mergear.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes('Preview Channel'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Delete preview channel on PR close
        if: github.event.action == 'closed'
        run: |
          CHANNEL="pr-${{ github.event.pull_request.number }}"
          npx firebase-tools hosting:channel:delete "$CHANNEL" \
            --only hosting:app \
            --project polar-scene-488615-i0 \
            --force || echo "Canal ya no existía, ok."
