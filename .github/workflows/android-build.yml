name: Android — Build AAB

on:
  # Solo en tags de release (v1.0.0, v1.2.3, etc.) o dispatch manual
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch o commit a buildear'
        default: 'main'
        required: false

jobs:
  build-aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies & build web
        run: npm ci && npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/pessy-release.keystore

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=pessy-release.keystore
          EOF

      - name: Build release AAB
        run: cd android && ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: pessy-release-aab-${{ github.ref_name }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Clean secrets
        if: always()
        run: rm -f android/app/pessy-release.keystore android/key.properties
