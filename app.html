  <script>
    (function () {
      var path = window.location.pathname;
      var isAppRoute =
        path === "/inicio" ||
        path === "/login" ||
        path === "/home" ||
        path === "/register" ||
        path === "/register-user" ||
        path === "/register-pet" ||
        path.indexOf("/register-pet/") === 0 ||
        path.indexOf("/review/") === 0 ||
        path === "/email-link" ||
        path.indexOf("/verify/") === 0 ||
        path.indexOf("/vet") === 0;

      var defaults = {
        title: "Pessy - Tu mascota, sus cosas, todo en orden",
        description: "Pessy organiza la identidad, los servicios, las compras, los papeles y los recordatorios de tu mascota en un solo lugar.",
        canonical: "https://pessy.app/",
        robots: "index,follow",
        lang: "es"
      };

      var byPath = {
        "/": defaults,
        "/privacidad": {
          title: "Politica de Privacidad - Pessy",
          description: "Conocé cómo protegemos los datos de tu mascota en Pessy.",
          canonical: "https://pessy.app/privacidad",
          robots: "index,follow",
          lang: "es"
        },
        "/terminos": {
          title: "Terminos y Condiciones - Pessy",
          description: "Consultá los términos de uso del ecosistema de identidad digital Pessy.",
          canonical: "https://pessy.app/terminos",
          robots: "index,follow",
          lang: "es"
        },
        "/login": {
          title: "Login | Pessy",
          description: "Accede a tu cuenta de Pessy.",
          canonical: "https://pessy.app/login",
          robots: "noindex,nofollow",
          lang: "es"
        }
      };

      var current = isAppRoute
        ? {
            title: byPath[path] ? byPath[path].title : "Pessy",
            description: byPath[path] ? byPath[path].description : "Accede a tu cuenta de Pessy.",
            canonical: "https://pessy.app" + path,
            robots: "noindex,nofollow",
            lang: "es"
          }
        : (byPath[path] || defaults);

      function upsertMeta(attr, key, value) {
        var el = document.head.querySelector('meta[' + attr + '="' + key + '"]');
        if (!el) {
          el = document.createElement("meta");
          el.setAttribute(attr, key);
          document.head.appendChild(el);
        }
        el.setAttribute("content", value);
      }

      function upsertLink(rel, href) {
        var el = document.head.querySelector('link[rel="' + rel + '"]');
        if (!el) {
          el = document.createElement("link");
          el.setAttribute("rel", rel);
          document.head.appendChild(el);
        }
        el.setAttribute("href", href);
      }

      document.title = current.title;
      document.documentElement.lang = current.lang;
      upsertMeta("name", "description", current.description);
      upsertMeta("name", "robots", current.robots);
      upsertMeta("name", "googlebot", current.robots);
      upsertMeta("property", "og:title", current.title);
      upsertMeta("property", "og:description", current.description);
      upsertMeta("property", "og:url", current.canonical);
      upsertMeta("name", "twitter:title", current.title);
      upsertMeta("name", "twitter:description", current.description);
      upsertLink("canonical", current.canonical);
    })();
  </script>

<body class="pessy-grain">
  <div id="root"></div>
  <!--
    SW stuck-recovery: si el bundle viejo tira un error ANTES que main.tsx arranque
    (import fail, hash mismatch, chunk 404, etc.), auto-redirigimos a /reset una
    sola vez. Esto vive acá en HTML puro para que funcione incluso si todos los
    scripts del bundle fallan.
  -->
  <script>
    (function(){
      var triggered = false;
      var triggerReset = function(reason){
        if (triggered) return;
        if (sessionStorage.getItem('pessy_auto_reset_done') === '1') return; // evitar loop
        triggered = true;
        sessionStorage.setItem('pessy_auto_reset_done', '1');
        console.warn('[Pessy] Bundle failure detected, redirecting to /reset', reason);
        window.location.replace('/reset');
      };
      window.addEventListener('error', function(e){
        var msg = (e && (e.message || (e.error && e.error.message))) || '';
        if (/Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed|chunk.*failed/i.test(msg)) {
          triggerReset(msg);
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e){
        var msg = (e && e.reason && (e.reason.message || String(e.reason))) || '';
        if (/Loading chunk|Failed to fetch dynamically imported module|Importing a module script failed/i.test(msg)) {
          triggerReset(msg);
        }
      });
      // Safety net: si después de 10s el root sigue vacío, asumimos bundle roto
      setTimeout(function(){
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          triggerReset('Root empty after 10s — bundle likely failed');
        }
      }, 10000);
    })();
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>
