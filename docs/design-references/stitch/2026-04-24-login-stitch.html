<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #F8FAFC;
        }
        .soft-shadow {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-md text-on-surface">
<div class="min-h-screen flex flex-col max-w-md mx-auto bg-surface overflow-hidden relative">
<div class="h-64 relative overflow-hidden flex items-end px-container-margin pb-lg">
<div class="absolute inset-0 z-0">
<img alt="Happy dog looking up" class="w-full h-full object-cover" data-alt="adorable golden retriever looking up with a soft expression in a sunlit bright modern room with soft focus" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPyANgeJ0RjpkjEVk5rZ72Xtbuo2WxsYQCUvPq5zqFALfU6eMcpFHyH6RewgiaE6r2eO1Tj6QhybT6Y8-NOf1Dks6fLgRJR7RorsZu4YF-ahQ20l9BfECAWqgDRGTwO8KSW3QTC0ZCU2bZruFY0KKmQXPITPsY7BP9y4TDfS2FTQQCuLHq4OJup5keSnbCoFZ_jkrYQsKwQBJMw7YbyaL89U5gf1jNcm80XktKvgMq16haoRW8fACUEdHlTFODoSrjm9kG9jA_ABo"/>
<div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/40 to-transparent"></div>
</div>
<div class="relative z-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary-container text-4xl" data-icon="pets">pets</span>
<h1 class="font-h1 text-h1 text-on-surface tracking-tight">Pessy</h1>
</div>
<p class="font-body-md text-on-surface-variant max-w-[240px]">The helpful companion for your pet's wellness journey.</p>
</div>
</div>
<main class="flex-1 px-container-margin pt-sm pb-xl">
<div class="space-y-lg">
<div class="space-y-md">
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-1" for="email">Email</label>
<input class="w-full h-14 px-md bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container font-body-md transition-all placeholder:text-outline-variant" id="email" placeholder="hello@pessy.com" type="email"/>
</div>
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-14 px-md bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary-container font-body-md transition-all placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<a class="font-label-md text-primary-container hover:underline transition-all" href="#">Forgot Password?</a>
</div>
</div>
<div class="space-y-md pt-sm">
<button class="w-full h-14 bg-primary-container text-on-primary font-label-md rounded-full flex items-center justify-center gap-2 active:scale-95 transition-transform soft-shadow">
                        Log In
                    </button>
<div class="flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant"></div>
<span class="font-label-sm text-outline">OR</span>
<div class="h-px flex-1 bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-card-gap">
<button class="h-14 bg-surface-container-lowest border border-outline-variant rounded-xl flex items-center justify-center gap-2 font-label-md text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-red-500" data-icon="google" style="font-variation-settings: 'FILL' 1;">google</span>
                            Google
                        </button>
<button class="h-14 bg-surface-container-lowest border border-outline-variant rounded-xl flex items-center justify-center gap-2 font-label-md text-on-surface active:scale-95 transition-transform">
<span class="material-symbols-outlined text-on-surface" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
                            Apple
                        </button>
</div>
</div>
</div>
</main>
<footer class="p-lg flex flex-col items-center gap-sm">
<p class="font-body-md text-on-surface-variant">Don't have an account?</p>
<button class="font-label-md text-primary-container px-lg py-sm rounded-full bg-primary-container/10 active:scale-95 transition-all">
                Sign Up
            </button>
</footer>
<div class="absolute bottom-10 -right-10 w-40 h-40 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
<div class="absolute top-20 -left-10 w-40 h-40 bg-tertiary-container/10 rounded-full blur-3xl -z-10"></div>
</div>
