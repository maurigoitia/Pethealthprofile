  <ellipse cx="45" cy="52" rx="9" ry="10" fill="#FBF2EB"/>
  <ellipse cx="75" cy="52" rx="9" ry="10" fill="#FBF2EB"/>
  <!-- Pupils (slit like cats) -->
  <ellipse cx="47" cy="53" rx="4" ry="6.5" fill="#6256EA"/>
  <ellipse cx="77" cy="53" rx="4" ry="6.5" fill="#6256EA"/>
  <circle cx="49" cy="50" r="2" fill="white"/>
  <circle cx="79" cy="50" r="2" fill="white"/>
  <!-- Nose -->
  <path d="M57 65 Q60 62 63 65 Q60 69 57 65Z" fill="#6256EA"/>
  <!-- Mouth -->
  <path d="M60 67 Q56 73 52 71" stroke="#6256EA" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M60 67 Q64 73 68 71" stroke="#6256EA" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="30" y1="64" x2="52" y2="65" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="28" y1="69" x2="51" y2="68" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="90" y1="64" x2="68" y2="65" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="92" y1="69" x2="69" y2="68" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="60" cy="104" rx="26" ry="24" fill="#FF8268"/>
  <!-- Belly -->
  <ellipse cx="60" cy="106" rx="16" ry="16" fill="#FDC5A6"/>
  <!-- Tail -->
  <path d="M84 108 Q102 96 104 110 Q106 122 90 118" stroke="#FF8268" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Paws -->
