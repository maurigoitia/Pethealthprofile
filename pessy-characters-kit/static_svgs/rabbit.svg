<svg xmlns="http://www.w3.org/2000/svg" width="120" height="140" viewBox="0 0 120 140" fill="none">
  <!-- Long ears -->
  <ellipse cx="40" cy="22" rx="11" ry="24" fill="#FF8268"/>
  <ellipse cx="80" cy="22" rx="11" ry="24" fill="#FF8268"/>
  <ellipse cx="40" cy="22" rx="6" ry="19" fill="#FDC5A6"/>
  <ellipse cx="80" cy="22" rx="6" ry="19" fill="#FDC5A6"/>
  <!-- Head -->
  <ellipse cx="60" cy="62" rx="30" ry="27" fill="#FF8268"/>
  <!-- Cheeks -->
  <ellipse cx="40" cy="70" rx="10" ry="8" fill="#FDC5A6" opacity="0.7"/>
  <ellipse cx="80" cy="70" rx="10" ry="8" fill="#FDC5A6" opacity="0.7"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="57" rx="9" ry="10" fill="#FBF2EB"/>
  <ellipse cx="74" cy="57" rx="9" ry="10" fill="#FBF2EB"/>
  <!-- Pupils -->
  <ellipse cx="48" cy="58" rx="5.5" ry="6" fill="#6256EA"/>
  <ellipse cx="76" cy="58" rx="5.5" ry="6" fill="#6256EA"/>
  <!-- Shine -->
  <circle cx="50" cy="55" r="2" fill="white"/>
  <circle cx="78" cy="55" r="2" fill="white"/>
  <!-- Nose -->
  <path d="M57 68 Q60 65 63 68 Q60 72 57 68Z" fill="#6256EA"/>
  <!-- Mouth -->
  <path d="M60 70 Q56 75 52 73" stroke="#6256EA" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M60 70 Q64 75 68 73" stroke="#6256EA" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="34" y1="68" x2="54" y2="68" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="34" y1="72" x2="54" y2="70" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="86" y1="68" x2="66" y2="68" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="86" y1="72" x2="66" y2="70" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Body -->
  <ellipse cx="60" cy="108" rx="28" ry="26" fill="#FF8268"/>
  <!-- Belly -->
  <ellipse cx="60" cy="110" rx="18" ry="18" fill="#FDC5A6"/>
  <!-- Feet -->
  <ellipse cx="42" cy="130" rx="14" ry="8" fill="#FF8268"/>
  <ellipse cx="78" cy="130" rx="14" ry="8" fill="#FF8268"/>
  <!-- Tail -->
  <circle cx="88" cy="105" r="8" fill="#FBF2EB"/>
</svg>