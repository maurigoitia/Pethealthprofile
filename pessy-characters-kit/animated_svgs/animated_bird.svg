<svg xmlns="http://www.w3.org/2000/svg" width="120" height="130" viewBox="0 0 120 130" fill="none">

  <style>
    /* ── Gentle float ── */
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }
    /* ── Breathing ── */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    /* ── Wiggle ── */
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(8deg); }
      60%     { transform: rotate(-6deg); }
    }
    /* ── Blink ── */
    @keyframes blink {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.08); }
    }
    /* ── Tail wag ── */
    @keyframes tailwag {
      0%,100% { transform: rotate(0deg); }
      30%     { transform: rotate(14deg); }
      70%     { transform: rotate(-10deg); }
    }
    /* ── Bounce ── */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-8px); }
      60%     { transform: translateY(-4px); }
    }
    /* Apply to root group */
    .char-root {
      animation: float 3.2s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .char-body {
      animation: breathe 2.8s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-ear-l {
      animation: wiggle 2.6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .char-ear-r {
      animation: wiggle 2.6s ease-in-out infinite reverse;
      transform-origin: bottom center;
    }
    .char-eye-l {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-eye-r {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
      animation-delay: 0.1s;
    }
    .char-tail {
      animation: tailwag 2s ease-in-out infinite;
      transform-origin: left center;
    }
  </style>

  <g class="char-root" id="bird">

  <!-- Crest feathers -->
  <ellipse cx="48" cy="14" rx="7" ry="14" fill="#1A9B7D" transform="rotate(-20 48 14)"/>
  <ellipse cx="60" cy="10" rx="7" ry="16" fill="#074738" transform="rotate(0 60 10)"/>
  <ellipse cx="72" cy="14" rx="7" ry="14" fill="#1A9B7D" transform="rotate(20 72 14)"/>
  <!-- Head -->
  <circle cx="60" cy="48" r="28" fill="#FF8268"/>
  <!-- Face mask -->
  <ellipse cx="60" cy="56" rx="18" ry="14" fill="#FDC5A6"/>
  <!-- Eye whites -->
  <ellipse cx="44" cy="44" rx="9" ry="10" fill="#FBF2EB"/>
  <ellipse cx="76" cy="44" rx="9" ry="10" fill="#FBF2EB"/>
  <!-- Pupils -->
  <ellipse cx="46" cy="45" rx="5.5" ry="6" fill="#6256EA"/>
  <ellipse cx="78" cy="45" rx="5.5" ry="6" fill="#6256EA"/>
  <circle cx="48" cy="42" r="2" fill="white"/>
  <circle cx="80" cy="42" r="2" fill="white"/>
  <!-- Beak -->
  <path d="M54 58 Q60 54 66 58 Q60 68 54 58Z" fill="#074738"/>
  <!-- Body -->
  <ellipse cx="60" cy="98" rx="26" ry="28" fill="#1A9B7D"/>
  <!-- Chest -->
  <ellipse cx="60" cy="100" rx="16" ry="18" fill="#FF8268"/>
  <!-- Wings -->
  <path d="M34 85 Q18 90 20 108 Q30 120 44 110 Q38 95 34 85Z" fill="#074738"/>
  <path d="M86 85 Q102 90 100 108 Q90 120 76 110 Q82 95 86 85Z" fill="#074738"/>
  <!-- Wing detail -->
  <path d="M26 95 Q32 98 38 96" stroke="#1A9B7D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M94 95 Q88 98 82 96" stroke="#1A9B7D" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Feet -->
  <path d="M50 124 L44 130 M50 124 L50 132 M50 124 L56 130" stroke="#074738" stroke-width="3" stroke-linecap="round"/>
  <path d="M70 124 L64 130 M70 124 L70 132 M70 124 L76 130" stroke="#074738" stroke-width="3" stroke-linecap="round"/>
  <!-- Tail feathers -->
  <path d="M48 122 Q40 132 36 138" stroke="#074738" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M60 124 Q60 136 60 142" stroke="#1A9B7D" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M72 122 Q80 132 84 138" stroke="#074738" stroke-width="5" fill="none" stroke-linecap="round"/>

  </g>
</svg>