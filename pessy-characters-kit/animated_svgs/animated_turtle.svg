<svg xmlns="http://www.w3.org/2000/svg" width="130" height="110" viewBox="0 0 130 110" fill="none">

  <style>
    /* ── Gentle float ── */
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }
    /* ── Breathing ── */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    /* ── Wiggle ── */
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(8deg); }
      60%     { transform: rotate(-6deg); }
    }
    /* ── Blink ── */
    @keyframes blink {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.08); }
    }
    /* ── Tail wag ── */
    @keyframes tailwag {
      0%,100% { transform: rotate(0deg); }
      30%     { transform: rotate(14deg); }
      70%     { transform: rotate(-10deg); }
    }
    /* ── Bounce ── */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-8px); }
      60%     { transform: translateY(-4px); }
    }
    /* Apply to root group */
    .char-root {
      animation: float 3.2s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .char-body {
      animation: breathe 2.8s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-ear-l {
      animation: wiggle 2.6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .char-ear-r {
      animation: wiggle 2.6s ease-in-out infinite reverse;
      transform-origin: bottom center;
    }
    .char-eye-l {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-eye-r {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
      animation-delay: 0.1s;
    }
    .char-tail {
      animation: tailwag 2s ease-in-out infinite;
      transform-origin: left center;
    }
  </style>

  <g class="char-root" id="turtle">

  <!-- Shell -->
  <ellipse cx="65" cy="58" rx="42" ry="36" fill="#1A9B7D"/>
  <!-- Shell pattern -->
  <path d="M65 28 L65 88" stroke="#074738" stroke-width="2" opacity="0.4"/>
  <path d="M28 48 Q65 58 102 48" stroke="#074738" stroke-width="2" opacity="0.4" fill="none"/>
  <path d="M30 65 Q65 75 100 65" stroke="#074738" stroke-width="2" opacity="0.4" fill="none"/>
  <path d="M40 38 Q65 44 90 38 Q85 58 90 76 Q65 82 40 76 Q35 58 40 38Z" fill="#074738" opacity="0.25"/>
  <!-- Shell hexagons simplified -->
  <circle cx="65" cy="55" r="12" fill="#074738" opacity="0.2"/>
  <circle cx="48" cy="48" r="8" fill="#074738" opacity="0.2"/>
  <circle cx="82" cy="48" r="8" fill="#074738" opacity="0.2"/>
  <circle cx="48" cy="66" r="8" fill="#074738" opacity="0.2"/>
  <circle cx="82" cy="66" r="8" fill="#074738" opacity="0.2"/>
  <!-- Head -->
  <ellipse cx="65" cy="30" rx="18" ry="16" fill="#FF8268"/>
  <!-- Head detail -->
  <ellipse cx="65" cy="34" rx="12" ry="9" fill="#FDC5A6"/>
  <!-- Eye whites -->
  <ellipse cx="55" cy="26" rx="7" ry="7.5" fill="#FBF2EB"/>
  <ellipse cx="75" cy="26" rx="7" ry="7.5" fill="#FBF2EB"/>
  <!-- Pupils -->
  <ellipse cx="57" cy="27" rx="4.5" ry="5" fill="#6256EA"/>
  <ellipse cx="77" cy="27" rx="4.5" ry="5" fill="#6256EA"/>
  <circle cx="58.5" cy="25" r="1.5" fill="white"/>
  <circle cx="78.5" cy="25" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M59 36 Q65 41 71 36" stroke="#6256EA" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <ellipse cx="30" cy="50" rx="12" ry="8" fill="#FF8268" transform="rotate(-20 30 50)"/>
  <ellipse cx="100" cy="50" rx="12" ry="8" fill="#FF8268" transform="rotate(20 100 50)"/>
  <ellipse cx="32" cy="72" rx="12" ry="7" fill="#FF8268" transform="rotate(10 32 72)"/>
  <ellipse cx="98" cy="72" rx="12" ry="7" fill="#FF8268" transform="rotate(-10 98 72)"/>
  <!-- Tail -->
  <path d="M65 88 Q72 96 68 102" stroke="#1A9B7D" stroke-width="5" fill="none" stroke-linecap="round"/>

  </g>
</svg>