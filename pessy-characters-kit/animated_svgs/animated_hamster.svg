<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120" fill="none">

  <style>
    /* ── Gentle float ── */
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }
    /* ── Breathing ── */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    /* ── Wiggle ── */
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(8deg); }
      60%     { transform: rotate(-6deg); }
    }
    /* ── Blink ── */
    @keyframes blink {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.08); }
    }
    /* ── Tail wag ── */
    @keyframes tailwag {
      0%,100% { transform: rotate(0deg); }
      30%     { transform: rotate(14deg); }
      70%     { transform: rotate(-10deg); }
    }
    /* ── Bounce ── */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-8px); }
      60%     { transform: translateY(-4px); }
    }
    /* Apply to root group */
    .char-root {
      animation: float 3.2s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .char-body {
      animation: breathe 2.8s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-ear-l {
      animation: wiggle 2.6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .char-ear-r {
      animation: wiggle 2.6s ease-in-out infinite reverse;
      transform-origin: bottom center;
    }
    .char-eye-l {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-eye-r {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
      animation-delay: 0.1s;
    }
    .char-tail {
      animation: tailwag 2s ease-in-out infinite;
      transform-origin: left center;
    }
  </style>

  <g class="char-root" id="hamster">

  <!-- Ears -->
  <ellipse cx="36" cy="28" rx="14" ry="12" fill="#FF8268"/>
  <ellipse cx="84" cy="28" rx="14" ry="12" fill="#FF8268"/>
  <ellipse cx="36" cy="29" rx="8" ry="7" fill="#FDC5A6"/>
  <ellipse cx="84" cy="29" rx="8" ry="7" fill="#FDC5A6"/>
  <!-- Body / head -->
  <ellipse cx="60" cy="70" rx="38" ry="32" fill="#FF8268"/>
  <!-- Chubby cheek pouches -->
  <ellipse cx="24" cy="75" rx="14" ry="12" fill="#FDC5A6"/>
  <ellipse cx="96" cy="75" rx="14" ry="12" fill="#FDC5A6"/>
  <!-- Head -->
  <ellipse cx="60" cy="55" rx="30" ry="28" fill="#FF8268"/>
  <!-- Belly -->
  <ellipse cx="60" cy="76" rx="22" ry="18" fill="#FDC5A6"/>
  <!-- Eye whites -->
  <ellipse cx="46" cy="50" rx="9" ry="10" fill="#FBF2EB"/>
  <ellipse cx="74" cy="50" rx="9" ry="10" fill="#FBF2EB"/>
  <!-- Pupils -->
  <ellipse cx="48" cy="51" rx="5.5" ry="6" fill="#6256EA"/>
  <ellipse cx="76" cy="51" rx="5.5" ry="6" fill="#6256EA"/>
  <!-- Eye shine -->
  <circle cx="50" cy="48" r="2" fill="white"/>
  <circle cx="78" cy="48" r="2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="60" cy="63" rx="5" ry="3.5" fill="#6256EA"/>
  <!-- Mouth -->
  <path d="M54 68 Q60 73 66 68" stroke="#6256EA" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="36" y1="64" x2="52" y2="65" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="35" y1="68" x2="51" y2="67" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="84" y1="64" x2="68" y2="65" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="85" y1="68" x2="69" y2="67" stroke="#FDC5A6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tiny paws -->
  <ellipse cx="34" cy="98" rx="10" ry="7" fill="#FF8268"/>
  <ellipse cx="86" cy="98" rx="10" ry="7" fill="#FF8268"/>
  <ellipse cx="34" cy="97" rx="6" ry="4" fill="#FDC5A6"/>
  <ellipse cx="86" cy="97" rx="6" ry="4" fill="#FDC5A6"/>

  </g>
</svg>