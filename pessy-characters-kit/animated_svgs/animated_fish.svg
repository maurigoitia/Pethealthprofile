<svg xmlns="http://www.w3.org/2000/svg" width="140" height="100" viewBox="0 0 140 100" fill="none">

  <style>
    /* ── Gentle float ── */
    @keyframes float {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-6px); }
    }
    /* ── Breathing ── */
    @keyframes breathe {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.04); }
    }
    /* ── Wiggle ── */
    @keyframes wiggle {
      0%,100% { transform: rotate(0deg); }
      20%     { transform: rotate(8deg); }
      60%     { transform: rotate(-6deg); }
    }
    /* ── Blink ── */
    @keyframes blink {
      0%,90%,100% { transform: scaleY(1); }
      95%          { transform: scaleY(0.08); }
    }
    /* ── Tail wag ── */
    @keyframes tailwag {
      0%,100% { transform: rotate(0deg); }
      30%     { transform: rotate(14deg); }
      70%     { transform: rotate(-10deg); }
    }
    /* ── Bounce ── */
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%     { transform: translateY(-8px); }
      60%     { transform: translateY(-4px); }
    }
    /* Apply to root group */
    .char-root {
      animation: float 3.2s ease-in-out infinite;
      transform-origin: center bottom;
    }
    .char-body {
      animation: breathe 2.8s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-ear-l {
      animation: wiggle 2.6s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .char-ear-r {
      animation: wiggle 2.6s ease-in-out infinite reverse;
      transform-origin: bottom center;
    }
    .char-eye-l {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
    }
    .char-eye-r {
      animation: blink 4s ease-in-out infinite;
      transform-origin: center center;
      animation-delay: 0.1s;
    }
    .char-tail {
      animation: tailwag 2s ease-in-out infinite;
      transform-origin: left center;
    }
  </style>

  <g class="char-root" id="fish">

  <!-- Tail fin -->
  <path d="M95 50 Q120 28 128 16 Q118 42 128 50 Q118 58 128 84 Q120 72 95 50Z" fill="#1A9B7D"/>
  <path d="M95 50 Q115 36 122 26 Q114 46 122 50 Q114 54 122 74 Q115 64 95 50Z" fill="#FF8268" opacity="0.6"/>
  <!-- Body -->
  <ellipse cx="60" cy="50" rx="46" ry="32" fill="#FF8268"/>
  <!-- Belly -->
  <ellipse cx="56" cy="56" rx="28" ry="18" fill="#FDC5A6"/>
  <!-- Scales pattern -->
  <path d="M45 35 Q52 32 60 35" stroke="#FDC5A6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M38 44 Q48 40 58 44" stroke="#FDC5A6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M60 35 Q68 32 76 35" stroke="#FDC5A6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M62 44 Q72 40 82 44" stroke="#FDC5A6" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Dorsal fin -->
  <path d="M50 24 Q60 10 70 18 Q64 24 72 26 Q60 28 48 28 Z" fill="#1A9B7D"/>
  <!-- Pectoral fin -->
  <path d="M56 52 Q44 60 40 68 Q50 64 62 62 Z" fill="#074738" opacity="0.5"/>
  <!-- Eye white -->
  <ellipse cx="34" cy="44" rx="12" ry="13" fill="#FBF2EB"/>
  <!-- Pupil -->
  <ellipse cx="36" cy="45" rx="7.5" ry="8" fill="#6256EA"/>
  <circle cx="38.5" cy="42" r="3" fill="white"/>
  <!-- Mouth -->
  <path d="M16 52 Q22 48 26 52 Q22 56 16 52Z" fill="#FDC5A6"/>
  <!-- Bubble -->
  <circle cx="10" cy="38" r="4" stroke="#1A9B7D" stroke-width="1.5" fill="none" opacity="0.6"/>
  <circle cx="4" cy="28" r="2.5" stroke="#1A9B7D" stroke-width="1.5" fill="none" opacity="0.6"/>

  </g>
</svg>